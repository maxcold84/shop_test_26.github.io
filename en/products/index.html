<script>
  document.addEventListener('DOMContentLoaded', async function () {
    const container = document.getElementById('product-list-container');
    const lang = 'en';

    function formatPrice(price) {
      return window.Utils.formatCurrency(price);
    }

    function renderPrice(product) {
      if (product.discount_price) {
        return `${formatPrice(product.discount_price)} <s class="text-muted">${formatPrice(product.price)}</s>`;
      }

      return formatPrice(product.price);
    }

    try {
      console.log('Loading product list from API...');
      const result = await productsApi.getList({ perPage: 100, sort: '-order,-created' });

      if (result.items && result.items.length > 0) {
        console.log('Products loaded:', result.items.length);
        container.innerHTML = '';

        result.items.forEach(product => {
          const imageUrl = (product.images && product.images.length > 0)
            ? productsApi.getImageUrl(product, product.images[0], '300x300')
            : 'https://via.placeholder.com/300x300?text=No+Image';

          const finalPrice = product.discount_price || product.price;
          const detailUrl = `/${lang}/products/${product.slug}/`;

          const col = document.createElement('div');
          col.className = 'col-lg-3 col-md-4 col-sm-6 mb-4';
          col.innerHTML = `
            <div class="block">
              <div class="gallery-overlay">
                <a href="${detailUrl}" class="gallery-popup">
                  <i class="tf-ion-plus-round"></i>
                </a>
                <button class="btn btn-primary btn-main-sm cart-btn"
                  style="position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); z-index: 10; white-space: nowrap; box-shadow: 0 2px 8px rgba(0,0,0,0.15);">
                  ${lang === 'ko' ? '🛒 장바구니 추가' : '🛒 Add to cart'}
                </button>
              </div>
              <img class="img-fluid" src="${imageUrl}" alt="${product.title}">
            </div>
            <div class="product-info">
              <h4 class="mb-2"><a href="${detailUrl}" class="link-title">${product.title}</a></h4>
              <p class="price">${renderPrice(product)}</p>
            </div>
          `;

          const cartBtn = col.querySelector('.cart-btn');
          cartBtn.addEventListener('click', function (e) {
            e.preventDefault();
            if (typeof Cart !== 'undefined' && Cart.addItem) {
              Cart.addItem({
                id: product.id,
                name: product.title,
                price: finalPrice,
                image: imageUrl,
                options: {
                  language: lang,
                  currency: lang === 'ko' ? 'KRW' : 'USD'
                }
              });
            } else {
              console.error('Cart is not defined');
              alert(lang === 'ko' ? '장바구니 기능을 사용할 수 없습니다.' : 'Cart is unavailable.');
            }
          });

          container.appendChild(col);
        });
      } else {
        console.log('No products found');
        container.innerHTML = `<div class="col-12 text-center"><p>${lang === 'ko' ? '등록된 상품이 없습니다.' : 'No products found.'}</p></div>`;
      }
    } catch (error) {
      console.error('Failed to load products:', error);
      container.innerHTML = `<div class="col-12 text-center"><p class="text-danger">${lang === 'ko' ? '상품을 불러오는 중 오류가 발생했습니다:' : 'Failed to load products:'} ${error.message}</p></div>`;
    }
  });
</script>
